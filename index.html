<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pacer - Script to Time Calculator</title>
  
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "vzpqfwcc52");
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --neon: #00ff66;
      --neon-dim: rgba(0, 255, 102, 0.15);
      --text-main: #ffffff;
      --text-sub: #888888;
      --border: #333333;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }
    h1 {
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.05em;
    }
    h1 span { color: var(--neon); }
    .subtitle {
      font-size: 13px;
      color: var(--text-sub);
      margin-top: 5px;
    }

    .time-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 0 40px var(--neon-dim);
    }
    .time-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 64px;
      font-weight: 700;
      color: var(--neon);
      line-height: 1;
      letter-spacing: -0.05em;
    }
    .time-label {
      font-size: 12px;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 10px;
    }

    .speed-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .speed-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 12px 0;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .speed-btn.active {
      background: var(--neon-dim);
      border-color: var(--neon);
      color: var(--neon);
    }

    textarea {
      width: 100%;
      height: 250px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      resize: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--neon);
    }
    textarea::placeholder {
      color: #555;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 10px;
      padding: 0 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Pacer<span>.</span></h1>
      <div class="subtitle">Script to Time Calculator</div>
    </header>

    <div class="time-display">
      <div class="time-value" id="displayTime">00:00</div>
      <div class="time-label">Estimated Time</div>
    </div>

    <div class="speed-controls">
      <button class="speed-btn" data-speed="0.85">Slow</button>
      <button class="speed-btn active" data-speed="1.0">Normal</button>
      <button class="speed-btn" data-speed="1.25">Fast</button>
    </div>

    <textarea id="scriptInput" placeholder="[BGM] Narrator: Hello! (pause) 
Paste your script here. Instructions in brackets or parentheses are automatically ignored!"></textarea>
    
    <div class="stats">
      <span id="detectedLang">Auto-detecting language...</span>
      <span style="color: var(--text-sub); opacity: 0.7;">Smart Script Mode: ON</span>
      <span id="countDisplay">0 words</span>
    </div>
  </div>

  <script>
    const input = document.getElementById('scriptInput');
    const displayTime = document.getElementById('displayTime');
    const detectedLangDisplay = document.getElementById('detectedLang');
    const countDisplay = document.getElementById('countDisplay');
    const speedBtns = document.querySelectorAll('.speed-btn');

    let currentSpeed = 1.0;

    speedBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        speedBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSpeed = parseFloat(btn.getAttribute('data-speed'));
        calculateTime();
      });
    });

    function calculateTime() {
      const text = input.value;
      const trimmedText = text.trim();
      
      if (!trimmedText) {
        displayTime.textContent = "00:00";
        detectedLangDisplay.textContent = "Waiting for script...";
        countDisplay.textContent = "0 words";
        return;
      }

      // 台本内の「読まない部分」を除外する処理を追加
      const cleanText = trimmedText
        .replace(/\[.*?\]/g, '')      // [ ] の中身を削除
        .replace(/\(.*?\)/g, '')      // ( ) の中身を削除
        .replace(/^.*?[：:]/gm, '')    // 行頭の「名前：」などを削除
        .trim();

      const isJapanese = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/.test(cleanText);
      
      let seconds = 0;

      if (isJapanese) {
        const charCount = cleanText.replace(/\s+/g, '').length;
        seconds = charCount / 5; 
        detectedLangDisplay.textContent = "🇯🇵 Japanese Detected";
        countDisplay.textContent = `${charCount} characters`;
      } else {
        const wordCount = cleanText.split(/\s+/).filter(word => word.length > 0).length;
        seconds = wordCount / 2.5;
        detectedLangDisplay.textContent = "🇺🇸 English Detected";
        countDisplay.textContent = `${wordCount} words`;
      }

      seconds = seconds / currentSpeed;

      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      displayTime.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    input.addEventListener('input', calculateTime);
  </script>
</body>
</html>
